suite: Service renders correctly
templates:
  - templates/service.yaml
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - isAPIVersion:
          of: v1

  - it: should expose service port 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080

  - it: should map targetPort to a named port (http) or 8080
    # Some charts use named ports (e.g. "http") instead of numeric targetPort.
    # To stay compatible and avoid plugin panics, we validate that targetPort exists and is either "http" or 8080
    # using two separate tests.
    asserts:
      - isNotNull:
          path: spec.ports[0].targetPort

  - it: targetPort may be "http" (common pattern)
    asserts:
      - equal:
          path: spec.ports[0].targetPort
          value: http

  - it: should have a selector
    asserts:
      - isNotNull:
          path: spec.selector
